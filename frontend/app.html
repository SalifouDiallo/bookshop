<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookshop</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/frontend/css/styles.css" />
  </head>

  <body>
    <div class="container py-3">

      <!-- En-tête avec navigation rapide -->
      <div class="app-header mb-4">
        <div>
          <h1 class="app-title m-0">Bookshop</h1>
          <p class="text-muted mb-0 small">Catalogue · Panier · Commandes</p>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-outline-primary nav-shortcut" data-bs-toggle="tab" data-bs-target="#catalogue">
            Catalogue
          </button>
          <button class="btn btn-outline-success nav-shortcut" data-bs-toggle="tab" data-bs-target="#panier">
            Panier <span id="cartCountBadge" class="badge text-bg-success ms-1">0</span>
          </button>
          <button class="btn btn-outline-secondary nav-shortcut" data-bs-toggle="tab" data-bs-target="#suivi">
            Suivi
          </button>
        </div>
      </div>

      <!-- Zone de messages globaux (succès, erreurs) -->
      <div id="globalMessage" class="mb-3"></div>

      <!-- Onglets principaux -->
      <ul class="nav nav-tabs custom-tabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#catalogue" type="button" role="tab">
            Catalogue
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panier" type="button" role="tab">
            Panier &amp; Commande
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#suivi" type="button" role="tab">
            Suivi de commande
          </button>
        </li>
      </ul>

      <div class="tab-content">

        <!-- ======== CATALOGUE ======== -->
        <div class="tab-pane fade show active" id="catalogue" role="tabpanel">

          <div class="d-flex flex-wrap gap-2 align-items-center mt-3">
            <div class="input-group search-bar" style="max-width: 480px;">
              <input id="q" class="form-control" placeholder="Rechercher par titre ou auteur..." />
              <button id="btnQ" class="btn btn-primary">Rechercher</button>
              <button id="btnReload" class="btn btn-outline-secondary">Tout afficher</button>
            </div>

            <div class="form-check form-switch mb-0 ms-1">
              <input class="form-check-input" type="checkbox" id="filterDispo" checked />
              <label class="form-check-label text-muted small" for="filterDispo">
                Disponibles seulement
              </label>
            </div>
          </div>

          <div id="resultsCount" class="text-muted small mt-2 mb-1"></div>
          <div id="grid" class="row g-3"></div>
        </div>

        <!-- ======== PANIER ======== -->
        <div class="tab-pane fade" id="panier" role="tabpanel">
          <div id="cartView" class="mt-3"></div>

          <hr />

          <div class="section-card">
            <h5 class="mb-3">Informations client</h5>

            <form id="orderForm" class="row g-3" novalidate>
              <div class="col-md-4">
                <label for="inputNom" class="form-label">Nom complet <span class="text-danger">*</span></label>
                <input id="inputNom" class="form-control" name="nom" placeholder="Ex : Marie Tremblay" required />
                <div class="invalid-feedback">Le nom est requis.</div>
              </div>
              <div class="col-md-4">
                <label for="inputEmail" class="form-label">Courriel <span class="text-danger">*</span></label>
                <input id="inputEmail" class="form-control" name="email" type="email" placeholder="Ex : marie@exemple.com" required />
                <div class="invalid-feedback">Veuillez entrer un courriel valide.</div>
              </div>
              <div class="col-md-4">
                <label for="inputAdresse" class="form-label">Adresse de livraison <span class="text-danger">*</span></label>
                <input id="inputAdresse" class="form-control" name="adresse" placeholder="Ex : 123 rue Principale, Saguenay" required />
                <div class="invalid-feedback">L'adresse est requise.</div>
              </div>
              <div class="col-12">
                <button id="submitOrderBtn" class="btn btn-success" type="submit">
                  Passer la commande
                </button>
              </div>
            </form>

            <div id="orderResult" class="mt-3"></div>
          </div>
        </div>

        <!-- ======== SUIVI ======== -->
        <div class="tab-pane fade" id="suivi" role="tabpanel">
          <div class="mt-3" style="max-width: 380px;">
            <label for="suiviId" class="form-label">Numéro de commande</label>
            <div class="input-group">
              <input id="suiviId" type="number" min="1" class="form-control" placeholder="Ex : 12" />
              <button id="btnSuivi" class="btn btn-secondary">Afficher</button>
            </div>
          </div>

          <div id="suiviOut" class="mt-3"></div>
        </div>

      </div>
    </div><!-- /container -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { getBooks, createOrder, getOrderById, updateOrderStatus } from "/frontend/js/api.js";

      // Références DOM
      const grid           = document.getElementById("grid");
      const q              = document.getElementById("q");
      const filterDispo    = document.getElementById("filterDispo");
      const resultsCount   = document.getElementById("resultsCount");
      const cartView       = document.getElementById("cartView");
      const orderForm      = document.getElementById("orderForm");
      const orderResult    = document.getElementById("orderResult");
      const suiviOut       = document.getElementById("suiviOut");
      const globalMessage  = document.getElementById("globalMessage");
      const cartCountBadge = document.getElementById("cartCountBadge");
      const submitOrderBtn = document.getElementById("submitOrderBtn");

      // Événements
      document.getElementById("btnQ").addEventListener("click", loadBooks);
      document.getElementById("btnReload").addEventListener("click", () => {
        q.value = "";
        filterDispo.checked = true;
        loadBooks();
      });
      document.getElementById("btnSuivi").addEventListener("click", loadSuivi);

      q.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); loadBooks(); }
      });

      document.getElementById("suiviId").addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); loadSuivi(); }
      });

      filterDispo.addEventListener("change", loadBooks);

      // ── Utilitaires ──────────────────────────────────────────────────────────

      // Convertit un montant en centimes vers une chaîne lisible (ex: 29.99 $)
      function money(c) {
        return (c / 100).toFixed(2) + " $";
      }

      // Échappe les caractères HTML pour éviter les injections XSS
      function escapeHtml(val) {
        return String(val)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      // ── Panier (localStorage) ────────────────────────────────────────────────

      function getCart() {
        return JSON.parse(localStorage.getItem("cart") || "[]");
      }

      function saveCart(cart) {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
      }

      function updateCartCount() {
        const total = getCart().reduce((sum, item) => sum + item.quantite, 0);
        cartCountBadge.textContent = total;
      }

      // ── Messages globaux ─────────────────────────────────────────────────────

      function showGlobalMessage(message, type = "success") {
        globalMessage.innerHTML = `
          <div class="alert alert-${type} success-message mb-0">${escapeHtml(message)}</div>
        `;
        setTimeout(() => { globalMessage.innerHTML = ""; }, 3000);
      }

      // ── Catalogue ────────────────────────────────────────────────────────────

      function addToCart(b) {
        const cart = getCart();
        const existing = cart.find((x) => x.book_id === b.id);

        if (existing) {
          existing.quantite += 1;
        } else {
          cart.push({
            book_id:    b.id,
            titre:      b.titre,
            prix_cents: b.prix_cents,
            quantite:   1,
          });
        }

        saveCart(cart);
        renderCart();
        showGlobalMessage(`"${b.titre}" a été ajouté au panier.`, "success");
      }

      async function loadBooks() {
        grid.innerHTML = '<div class="text-muted py-3">Chargement...</div>';
        resultsCount.textContent = "";

        try {
          const books = await getBooks(q.value);

          // Filtre côté client selon la case à cocher
          const filtered = filterDispo.checked ? books.filter((b) => b.disponible) : books;

          grid.innerHTML = "";

          if (filtered.length === 0) {
            grid.innerHTML = `
              <div class="col-12">
                <div class="alert alert-light border text-center">Aucun livre trouvé.</div>
              </div>
            `;
            resultsCount.textContent = "0 résultat";
            return;
          }

          const nb = filtered.length;
          resultsCount.textContent = `${nb} livre${nb > 1 ? "s" : ""} trouvé${nb > 1 ? "s" : ""}`;

          filtered.forEach((b) => {
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-lg-4";

            // Tronque la description si elle est trop longue
            const desc = b.description
              ? escapeHtml(b.description.length > 110 ? b.description.slice(0, 110) + "…" : b.description)
              : '<span class="text-muted fst-italic">Aucune description.</span>';

            col.innerHTML = `
              <div class="card book-card h-100">
                <img
                  src="${escapeHtml(b.image_url || "https://picsum.photos/seed/noimg/600/360")}"
                  alt="Couverture — ${escapeHtml(b.titre)}"
                  loading="lazy"
                />
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title mb-1">${escapeHtml(b.titre)}</h5>
                  <div class="text-muted small mb-2">${escapeHtml(b.auteur)}</div>
                  <p class="book-description small flex-grow-1">${desc}</p>
                  <div class="mt-auto d-flex justify-content-between align-items-center pt-2">
                    <span class="prix-badge">${money(b.prix_cents)}</span>
                    <button
                      class="btn btn-sm ${b.disponible ? "btn-primary" : "btn-outline-secondary"}"
                      ${b.disponible ? "" : "disabled"}
                    >
                      ${b.disponible ? "Ajouter au panier" : "Indisponible"}
                    </button>
                  </div>
                </div>
              </div>
            `;

            col.querySelector("button")?.addEventListener("click", () => addToCart(b));
            grid.appendChild(col);
          });

        } catch (err) {
          grid.innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
        }
      }

      // ── Panier ───────────────────────────────────────────────────────────────

      function renderCart() {
        const cart = getCart();

        if (cart.length === 0) {
          cartView.innerHTML = `
            <div class="alert alert-info cart-empty">
              <strong>Votre panier est vide.</strong><br />
              Ajoutez des livres depuis le catalogue pour créer une commande.
            </div>
          `;
          updateCartCount();
          return;
        }

        let sous = 0;

        const rows = cart.map((it, i) => {
          const ligneTotal = it.prix_cents * it.quantite;
          sous += ligneTotal;
          return `
            <tr>
              <td>${escapeHtml(it.titre)}</td>
              <td style="max-width:90px;">
                <input type="number" min="1" max="99" value="${it.quantite}"
                  data-i="${i}" class="form-control form-control-sm qty" />
              </td>
              <td class="text-end">${money(it.prix_cents)}</td>
              <td class="text-end">${money(ligneTotal)}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-danger rm" data-i="${i}">Retirer</button>
              </td>
            </tr>
          `;
        }).join("");

        const taxes     = Math.round(sous * 0.14975);
        const livraison = sous > 0 ? 500 : 0;
        const total     = sous + taxes + livraison;

        cartView.innerHTML = `
          <div class="section-card">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Livre</th><th>Qté</th>
                  <th class="text-end">Prix unit.</th>
                  <th class="text-end">Sous-total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>

            <div class="order-summary mt-3">
              <div class="d-flex justify-content-between">
                <span>Sous-total</span><strong>${money(sous)}</strong>
              </div>
              <div class="d-flex justify-content-between">
                <span>Taxes (TPS + TVQ, 14,975&nbsp;%)</span><strong>${money(taxes)}</strong>
              </div>
              <div class="d-flex justify-content-between">
                <span>Livraison</span><strong>${money(livraison)}</strong>
              </div>
              <hr />
              <div class="d-flex justify-content-between order-total">
                <span>Total estimé</span><span>${money(total)}</span>
              </div>
            </div>
          </div>
        `;

        cartView.querySelectorAll(".qty").forEach((inp) =>
          inp.addEventListener("change", (e) => {
            const i = Number(e.target.dataset.i);
            const cart = getCart();
            cart[i].quantite = Math.max(1, parseInt(e.target.value || "1", 10));
            saveCart(cart);
            renderCart();
          })
        );

        cartView.querySelectorAll(".rm").forEach((btn) =>
          btn.addEventListener("click", (e) => {
            const i = Number(e.target.dataset.i);
            const cart = getCart();
            const titre = cart[i]?.titre || "Livre";
            cart.splice(i, 1);
            saveCart(cart);
            renderCart();
            showGlobalMessage(`"${titre}" a été retiré du panier.`, "warning");
          })
        );

        updateCartCount();
      }

      // ── Soumission commande ──────────────────────────────────────────────────

      orderForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!orderForm.checkValidity()) {
          orderForm.classList.add("was-validated");
          return;
        }

        const cart = getCart();
        if (cart.length === 0) {
          orderResult.innerHTML = '<div class="alert alert-warning">Le panier est vide.</div>';
          return;
        }

        const fd = new FormData(orderForm);
        const payload = {
          client: {
            nom:     String(fd.get("nom")     || "").trim(),
            email:   String(fd.get("email")   || "").trim(),
            adresse: String(fd.get("adresse") || "").trim(),
          },
          items: cart.map((x) => ({ book_id: x.book_id, quantite: x.quantite })),
        };

        submitOrderBtn.disabled    = true;
        submitOrderBtn.textContent = "Traitement en cours...";

        try {
          const data = await createOrder(payload);

          localStorage.removeItem("cart");
          updateCartCount();
          renderCart();
          orderForm.reset();
          orderForm.classList.remove("was-validated");

          orderResult.innerHTML = `
            <div class="alert alert-success success-message">
              <strong>Commande créée avec succès !</strong><br />
              Numéro de commande : <strong>#${data.id}</strong><br />
              Total : <strong>${money(data.total_cents)}</strong><br />
              <span class="text-muted small">Notez ce numéro pour suivre votre commande dans l'onglet "Suivi".</span>
            </div>
          `;

          showGlobalMessage("Commande créée avec succès.", "success");

        } catch (err) {
          orderResult.innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
        } finally {
          submitOrderBtn.disabled    = false;
          submitOrderBtn.textContent = "Passer la commande";
        }
      });

      // ── Suivi de commande ────────────────────────────────────────────────────

      // Retourne les boutons d'action selon le statut courant
      function renderStatusActions(statut) {
        if (statut === "en_attente") {
          return `
            <div class="mt-3">
              <button class="btn btn-outline-success" data-s="payee">Marquer comme payée</button>
            </div>`;
        }
        if (statut === "payee") {
          return `
            <div class="mt-3">
              <button class="btn btn-outline-primary" data-s="livree">Marquer comme livrée</button>
            </div>`;
        }
        return `<p class="text-muted mt-3 small">Aucune action possible — commande livrée.</p>`;
      }

      async function loadSuivi() {
        const id = document.getElementById("suiviId").value.trim();

        if (!id) {
          suiviOut.innerHTML = '<div class="alert alert-warning">Veuillez entrer un numéro de commande.</div>';
          return;
        }

        suiviOut.innerHTML = '<div class="text-muted">Chargement...</div>';

        try {
          const o = await getOrderById(id);

          const badgeClass =
            o.statut === "livree" ? "bg-primary" :
            o.statut === "payee"  ? "bg-success"  :
                                    "bg-warning text-dark";

          const statutLabel =
            o.statut === "livree" ? "Livrée"    :
            o.statut === "payee"  ? "Payée"     :
                                    "En attente";

          const lignes = o.items.map((it) => `
            <li class="list-group-item d-flex justify-content-between">
              <span>${escapeHtml(it.titre)} <span class="text-muted">x${it.quantite}</span></span>
              <span>${money(it.ligne_total_cents)}</span>
            </li>
          `).join("");

          suiviOut.innerHTML = `
            <div class="card section-card">
              <div class="card-body">
                <h5 class="mb-3">
                  Commande #${o.id}
                  <span class="badge ${badgeClass} ms-2">${statutLabel}</span>
                </h5>

                <p class="mb-3">
                  <strong>${escapeHtml(o.client.nom)}</strong>
                  <span class="text-muted"> — ${escapeHtml(o.client.email)}</span><br />
                  <span class="text-muted small">${escapeHtml(o.client.adresse)}</span>
                </p>

                <ul class="list-group mb-3">${lignes}</ul>

                <div class="order-summary">
                  <div class="d-flex justify-content-between">
                    <span>Sous-total</span><strong>${money(o.sous_total_cents)}</strong>
                  </div>
                  <div class="d-flex justify-content-between">
                    <span>Taxes</span><strong>${money(o.taxes_cents)}</strong>
                  </div>
                  <div class="d-flex justify-content-between">
                    <span>Livraison</span><strong>${money(o.livraison_cents)}</strong>
                  </div>
                  <hr />
                  <div class="d-flex justify-content-between order-total">
                    <span>Total</span><span>${money(o.total_cents)}</span>
                  </div>
                </div>

                ${renderStatusActions(o.statut)}
              </div>
            </div>
          `;

          suiviOut.querySelectorAll("button[data-s]").forEach((btn) =>
            btn.addEventListener("click", async () => {
              const statut = btn.getAttribute("data-s");
              btn.disabled = true;
              try {
                await updateOrderStatus(o.id, statut);
                showGlobalMessage("Statut mis à jour.", "success");
                loadSuivi();
              } catch (err) {
                showGlobalMessage(err.message, "danger");
                btn.disabled = false;
              }
            })
          );

        } catch (err) {
          suiviOut.innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
        }
      }

      // Initialisation au chargement
      updateCartCount();
      renderCart();
      loadBooks();
    </script>
  </body>
</html>
